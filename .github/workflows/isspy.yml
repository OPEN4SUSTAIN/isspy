name: isspy

on:
  schedule:
    - cron: '*/20 * * * *'  # every 20 minutes
  workflow_dispatch:       # manual trigger from GitHub UI

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Run fork watcher
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python scripts/check_forks.py

      - name: Save state
        run: |
          git config user.name "isspy-bot"
          git config user.email "isspy@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "chore: state update $(date -u +%F)"
          git pull --rebase
          git push
